<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <title>Birikim Takibi Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --profit: #22c55e;
      --loss: #ef4444;
      --text: #f8fafc;
    }

    body { 
      font-family: 'Inter', sans-serif; 
      background-color: var(--bg); 
      color: var(--text); 
      margin: 0; padding: 20px; 
    }

    .container { max-width: 1100px; margin: auto; }

    /* Dashboard Kartları */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.05);
      text-align: center;
    }

    .card h3 { margin: 0; font-size: 0.9rem; opacity: 0.7; font-weight: 400; }
    .card .value { font-size: 1.6rem; font-weight: 600; margin-top: 10px; display: block; }

    /* Form Alanı */
    .form-box {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
      align-items: end;
    }

    input, select, button {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #fff;
      font-size: 14px;
    }

    button {
      background: var(--accent);
      color: #000;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: 0.3s;
    }

    button:hover { opacity: 0.8; transform: translateY(-2px); }
    button:disabled { background: #475569; cursor: not-allowed; }

    .btn-delete { background: var(--loss); color: white; padding: 5px 10px; }

    /* Tablo */
    .table-container { overflow-x: auto; background: var(--card-bg); border-radius: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
    th { background: rgba(255,255,255,0.02); font-weight: 600; cursor: pointer; }
    tr:hover { background: rgba(255,255,255,0.03); }

    .profit { color: var(--profit); font-weight: 600; }
    .loss { color: var(--loss); font-weight: 600; }

    .chart-container {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 16px;
      margin-top: 30px;
    }

    @media (max-width: 768px) {
      .form-box { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1 style="text-align: center; margin-bottom: 30px;">💎 Birikim Paneli</h1>

  <div class="dashboard-grid">
    <div class="card">
      <h3>Toplam Birikim</h3>
      <span class="value" id="toplamTL">₺0.00</span>
    </div>
    <div class="card">
      <h3>Toplam Kâr/Zarar</h3>
      <span class="value" id="toplamKarZarar">₺0.00</span>
    </div>
    <div class="card">
      <h3>Altın Varlığı</h3>
      <span class="value" id="toplamAltin">0.00 gr</span>
    </div>
  </div>

  <div class="form-box">
    <div>
      <label>Tarih</label><br>
      <input type="date" id="date" style="width: 100%;">
    </div>
    <div>
      <label>Tür</label><br>
      <select id="currency" onchange="updateLabels()" style="width: 100%;">
        <option value="GA">Altın</option>
        <option value="USD">Dolar</option>
        <option value="EUR">Euro</option>
        <option value="GBP">Sterlin</option>
      </select>
    </div>
    <div id="ayarGroup">
      <label>Ayar</label><br>
      <select id="ayar" style="width: 100%;">
        <option value="0.995">24 Ayar</option>
        <option value="0.916">22 Ayar</option>
        <option value="0.750">18 Ayar</option>
        <option value="0.585">14 Ayar</option>
      </select>
    </div>
    <div>
      <label id="gramLabel">Gram/Miktar</label><br>
      <input type="number" id="gram" step="0.01" style="width: 100%;">
    </div>
    <div>
      <label id="alisLabel">Alış Fiyatı (TL)</label><br>
      <input type="number" id="alis" step="0.01" style="width: 100%;">
    </div>
    <button onclick="kaydet()" style="width: 100%;">Ekle</button>
  </div>

  <div class="form-box" style="background: rgba(56, 189, 248, 0.05); border: 1px dashed var(--accent);">
    <div><label>Altın</label><input type="number" id="kurGA" value="3150" style="width: 100%;"></div>
    <div><label>Dolar</label><input type="number" id="kurUSD" value="34.20" style="width: 100%;"></div>
    <div><label>Euro</label><input type="number" id="kurEUR" value="37.10" style="width: 100%;"></div>
    <div><label>Sterlin</label><input type="number" id="kurGBP" value="44.20" style="width: 100%;"></div>
    <button onclick="renderTable()" style="width: 100%; background: #fff;">Piyasayı Uygula</button>
  </div>

  <div class="table-container">
    <table id="table">
      <thead>
        <tr>
          <th>Tarih</th>
          <th>Tür</th>
          <th>Miktar</th>
          <th>Has Gram</th>
          <th>Alış</th>
          <th>Maliyet</th>
          <th>Güncel Kur</th>
          <th>Değer</th>
          <th>Kâr/Zarar</th>
          <th>İşlem</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="chart-container">
    <canvas id="chart" height="120"></canvas>
  </div>
</div>

<script>
  let birikimler = JSON.parse(localStorage.getItem('birikimler')) || [];
  let chart = null;

  function updateLabels() {
    const curr = document.getElementById("currency").value;
    document.getElementById("ayarGroup").style.visibility = curr === "GA" ? "visible" : "hidden";
    document.getElementById("gramLabel").innerText = curr === "GA" ? "Gram" : "Miktar";
  }

  function kaydet() {
    const data = {
      id: Date.now(),
      tarih: document.getElementById("date").value,
      tur: document.getElementById("currency").value,
      ayar: parseFloat(document.getElementById("ayar").value),
      miktar: parseFloat(document.getElementById("gram").value),
      alis: parseFloat(document.getElementById("alis").value)
    };

    if(!data.tarih || isNaN(data.miktar)) return alert("Lütfen boş alan bırakmayın.");

    birikimler.push(data);
    localStorage.setItem('birikimler', JSON.stringify(birikimler));
    renderTable();
    clearForm();
  }

  function sil(id) {
    birikimler = birikimler.filter(b => b.id !== id);
    localStorage.setItem('birikimler', JSON.stringify(birikimler));
    renderTable();
  }

  function renderTable() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    
    let tTL = 0, tKZ = 0, tGA = 0;
    let chartData = { GA: 0, USD: 0, EUR: 0, GBP: 0 };

    birikimler.forEach(b => {
      const kur = parseFloat(document.getElementById("kur" + b.tur).value);
      const hasGram = b.tur === "GA" ? b.miktar * b.ayar : b.miktar;
      const maliyet = hasGram * b.alis;
      const deger = hasGram * kur;
      const kz = deger - maliyet;

      tTL += deger;
      tKZ += kz;
      if(b.tur === "GA") tGA += b.miktar;
      chartData[b.tur] += deger;

      const row = `
        <tr>
          <td>${b.tarih}</td>
          <td><b>${b.tur}</b></td>
          <td>${b.miktar}</td>
          <td>${hasGram.toFixed(2)}</td>
          <td>₺${b.alis}</td>
          <td>₺${maliyet.toFixed(2)}</td>
          <td>₺${kur}</td>
          <td>₺${deger.toFixed(2)}</td>
          <td class="${kz >= 0 ? 'profit' : 'loss'}">₺${kz.toFixed(2)}</td>
          <td><button class="btn-delete" onclick="sil(${b.id})">Sil</button></td>
        </tr>
      `;
      tbody.innerHTML += row;
    });

    document.getElementById("toplamTL").innerText = "₺" + tTL.toLocaleString('tr-TR');
    document.getElementById("toplamKarZarar").innerText = "₺" + tKZ.toLocaleString('tr-TR');
    document.getElementById("toplamKarZarar").className = "value " + (tKZ >= 0 ? "profit" : "loss");
    document.getElementById("toplamAltin").innerText = tGA.toFixed(2) + " gr";

    renderChart(chartData);
  }

  function renderChart(data) {
    const ctx = document.getElementById('chart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Altın', 'Dolar', 'Euro', 'Sterlin'],
        datasets: [{
          data: [data.GA, data.USD, data.EUR, data.GBP],
          backgroundColor: ['#f1c40f', '#38bdf8', '#22c55e', '#a855f7'],
          borderWidth: 0
        }]
      },
      options: {
        plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } }
      }
    });
  }

  function clearForm() {
    document.getElementById("gram").value = "";
    document.getElementById("alis").value = "";
  }

  window.onload = () => {
    updateLabels();
    renderTable();
  };
</script>
</body>
</html>
